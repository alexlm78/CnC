<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::content})}">
<head>
	<title th:text="${isNew} ? 'Create Legacy Catalog' : 'Edit Legacy Catalog'">Legacy Catalog</title>
</head>
<body>
<div th:fragment="content">
	<h1 th:text="${isNew} ? 'Create Legacy Catalog' : 'Edit Legacy Catalog'">Legacy Catalog</h1>

	<div class="card">
		<div class="card-header" th:if="${!isNew}">
			<div class="d-flex justify-content-between align-items-center">
				<strong>P_ID: <span th:text="${catalog.sourceId}">123</span></strong>
				<span class="badge bg-warning text-dark">Legacy (RV_CATALOGOS)</span>
			</div>
		</div>
		<div class="card-body">
			<form th:action="${isNew} ? @{/catalogs/legacy} : @{/catalogs/legacy/{id}/update(id=${catalog.sourceId})}"
				  method="post"
				  th:object="${catalog}">

				<div class="row mb-3">
					<div class="col-md-3">
						<label class="form-label">CADENA (SBS_NO) *</label>
						<select class="form-select" th:field="*{sbsNo}" required>
							<option th:value="1" th:selected="${catalog.sbsNo == 1}">GNC (1)</option>
							<option th:value="2" th:selected="${catalog.sbsNo == 2}">Arca (2)</option>
						</select>
					</div>
					<div class="col-md-3">
						<label class="form-label">MODULO *</label>
						<input type="text"
							   class="form-control"
							   th:field="*{modulo}"
							   maxlength="50"
							   required>
					</div>
					<div class="col-md-3">
						<label class="form-label">CAMPO *</label>
						<input type="text"
							   class="form-control"
							   th:field="*{campo}"
							   maxlength="50"
							   required>
					</div>
					<div class="col-md-3">
						<label class="form-label">VALOR *</label>
						<input type="text"
							   class="form-control"
							   th:field="*{valor}"
							   maxlength="100"
							   required>
					</div>
				</div>

				<div class="row mb-3">
					<div class="col-md-6">
						<label class="form-label">DESCRIPCION</label>
						<input type="text"
							   class="form-control"
							   th:field="*{descripcion}"
							   maxlength="200">
					</div>
					<div class="col-md-3">
						<label class="form-label">ORDEN</label>
						<input type="number"
							   class="form-control"
							   th:field="*{orden}">
					</div>
					<div class="col-md-3">
						<label class="form-label">ACTIVO</label>
						<select class="form-select" th:field="*{activo}">
							<option th:value="1">Activo</option>
							<option th:value="0">Inactivo</option>
						</select>
					</div>
				</div>


				<input type="hidden" name="returnModulo" th:value="${returnModulo}">
				<input type="hidden" name="returnCampo" th:value="${returnCampo}">
				<input type="hidden" name="returnSbsNo" th:value="${returnSbsNo}">
				<input type="hidden" name="returnHasConversion" th:value="${returnHasConversion}">
				<input type="hidden" name="returnPage" th:value="${returnPage}">
				<input type="hidden" name="returnSize" th:value="${returnSize}">
				<input type="hidden" name="returnSearchTerm" th:value="${returnSearchTerm}">
				<div class="mt-3">
					<button type="submit" class="btn btn-primary" th:text="${isNew} ? 'Create' : 'Update'">Save</button>
					<a th:href="@{/catalogs(modulo=${returnModulo},campo=${returnCampo},sbsNo=${returnSbsNo},hasConversion=${returnHasConversion},page=${returnPage},size=${returnSize},searchTerm=${returnSearchTerm})}" class="btn btn-secondary">Back to List</a>
				</div>
			</form>

			<!-- Target Section (separate form, only on edit) -->
			<div th:if="${!isNew}" class="mt-4">
				<hr>
				<h6>Legacy Target</h6>
				<form th:action="@{/catalogs/target/save}" method="post">
					<input type="hidden" name="modulo" th:value="${catalog.modulo}">
					<input type="hidden" name="campo" th:value="${catalog.campo}">
					<input type="hidden" name="valor" th:value="${catalog.valor}">
					<input type="hidden" name="cadena" th:value="${catalog.sbsNo}">
					<input type="hidden" name="returnModulo" th:value="${returnModulo}">
					<input type="hidden" name="returnCampo" th:value="${returnCampo}">
					<input type="hidden" name="returnSbsNo" th:value="${returnSbsNo}">
					<input type="hidden" name="returnHasConversion" th:value="${returnHasConversion}">
					<input type="hidden" name="returnPage" th:value="${returnPage}">
					<input type="hidden" name="returnSize" th:value="${returnSize}">
					<input type="hidden" name="returnSearchTerm" th:value="${returnSearchTerm}">
					<div class="row mb-3">
						<div class="col-md-6">
							<label class="form-label">SRCTABLE</label>
							<input type="text"
								   class="form-control"
								   name="srcTable"
								   th:value="${catalog.srcTable}"
								   maxlength="35"
								   placeholder="Source table name">
						</div>
						<div class="col-md-6">
							<label class="form-label">SRCFIELD</label>
							<input type="text"
								   class="form-control"
								   name="srcField"
								   th:value="${catalog.srcField}"
								   maxlength="35"
								   placeholder="Source field name">
						</div>
					</div>
					<button type="submit" class="btn btn-outline-dark btn-sm">Save Target</button>
				</form>
			</div>
		</div>
	</div>
</div>
</body>
</html>
